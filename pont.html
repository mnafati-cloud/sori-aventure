<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e1219">
<title>소리 · Le pont — démo</title>
<style>
  :root{--ground:#0e1219;--ground2:#080b11;--panel:#161d2b;--panel2:#1c2536;--line:#28324a;
    --ink:#ece4d6;--dim:#9aa3b6;--muted:#6a7489;--amber:#f0a04b;--amber-s:#f6c684;
    --ok:#82cd93;--warn:#e0b15c;--err:#e58a8a;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --ko:"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;}
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--ground2);color:var(--ink);font-family:var(--sans)}
  body{background:radial-gradient(120% 60% at 78% -8%,rgba(240,160,75,.10),transparent 60%),var(--ground)}
  #app{max-width:600px;margin:0 auto;min-height:100dvh;padding:16px clamp(16px,5vw,26px) 40px}
  h1{font-size:1.02rem;margin:0 0 2px}
  .sub{color:var(--dim);font-size:.83rem;margin:0 0 16px;line-height:1.4}
  .seg{display:flex;gap:6px;margin:0 0 16px}
  .seg button{flex:1;font:inherit;font-weight:600;color:var(--dim);background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px;cursor:pointer}
  .seg button.on{color:#fff;border-color:var(--amber);background:#212b3e}
  .btn{font:inherit;font-weight:600;color:var(--ink);background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:13px 16px;cursor:pointer}
  .btn:hover{border-color:#3a4a66}
  .btn.big{width:100%;text-align:center;font-size:1.05rem;padding:15px}
  .btn.enter{color:#0e1219;background:var(--amber);border-color:var(--amber)}
  .btn.enter[disabled]{opacity:1}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  /* PORTE */
  .door{border:1px solid var(--line);border-radius:16px;background:#12182360;padding:20px 18px;text-align:center}
  .door .epi{font-family:var(--ko);color:var(--amber);letter-spacing:.1em;font-size:.9rem}
  .door h2{margin:.2em 0 .1em;font-size:1.5rem}
  .door .story{color:var(--dim);font-size:.9rem;margin:0 0 18px}
  .gauge{display:inline-flex;flex-direction:column;align-items:center;gap:6px;margin:6px 0 4px}
  .dot{width:66px;height:66px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.7rem;border:2px solid}
  .gauge .lab{font-weight:700}
  .gauge .cnt{color:var(--dim);font-size:.82rem}
  .ok .dot{border-color:var(--ok);background:rgba(130,205,147,.12)} .ok .lab{color:var(--ok)}
  .warn .dot{border-color:var(--warn);background:rgba(224,177,92,.12)} .warn .lab{color:var(--warn)}
  .no .dot{border-color:var(--err);background:rgba(229,138,138,.12)} .no .lab{color:var(--err)}
  .hint{color:var(--muted);font-size:.8rem;margin-top:16px;line-height:1.4}
  /* DEDANS (histoire brute) */
  .deconly{font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:2px 0 10px}
  .npc{font-family:var(--ko);font-size:1.4rem;color:#fff;border-left:2px solid var(--line);padding-left:14px;margin:4px 0 4px}
  .npcfr{color:var(--dim);font-size:.85rem;margin:0 0 18px}
  .choice{width:100%;text-align:left;border:1px solid var(--line);border-radius:12px;background:#12182360;padding:14px;margin-bottom:11px;cursor:pointer}
  .choice:hover{background:#1a2130;border-color:#3a4a66}
  .choice .kr{font-family:var(--ko);font-size:1.3rem;color:#fff}
  .out{margin-top:8px;min-height:1.3em;font-size:.95rem;line-height:1.5}
  .out .g{color:var(--ok)} .out .b{color:var(--err)}
  .back{background:none;border:0;color:var(--dim);cursor:pointer;font:inherit;padding:6px 0;margin-bottom:8px}
</style>
</head>
<body>
<div id="app">
  <h1>Le pont — l'app ⇄ l'histoire</h1>
  <p class="sub">La jauge est <b>à la porte du chapitre</b>, pas sur les réponses. Tu révises, tu vois tes chances,
    tu décides d'entrer. <b>Dedans, aucune aide</b> : coréen brut, les choix coûtent.</p>

  <div class="seg" id="seg">
    <button data-c="arrivee" class="on">Chapitre · Arrivée</button>
    <button data-c="taxi">Chapitre · Taxi</button>
  </div>
  <div id="view"></div>
</div>
<script>
(function(){
  "use strict";
  const START={ '안녕하세요':5,'감사합니다':5,'네':4,'아니요':4 };   // débutant : salutations
  let mastery=Object.assign({},START);
  const KNOWN=3;

  const CH={
    arrivee:{ titre:'Arrivée', porte:'Ton premier soir à Séoul. Dans le hall, quelqu’un te salue.',
      npc:'안녕하세요.', fr:'(on te salue)', req:['안녕하세요','아니요'], choices:[
        {kr:'안녕하세요.', need:['안녕하세요'], bon:'Tu réponds au salut. Un sourire te répond.'},
        {kr:'아니요.', need:['아니요'], bon:'« Non » à un bonjour ? La personne cligne des yeux — mais tu t’es fait comprendre.'},
        {kr:'— rester muet —', need:[], bon:'Tu ne dis rien. Tu passes pour distant, mais rien n’est cassé.'} ]},
    taxi:{ titre:'En taxi', porte:'Tu montes à l’arrière. Le chauffeur attend ta destination.',
      npc:'어디로 가세요?', fr:'', req:['홍대','까지','가다','주다','에서','오다'], choices:[
        {kr:'홍대까지 가 주세요.', need:['홍대','까지','가다','주다'], bon:'« 네, 홍대. » Le compteur s’allume, la voiture démarre.'},
        {kr:'홍대에서 왔어요.', need:['홍대','에서','오다'], bon:'Le chauffeur fronce les sourcils : tu viens de dire « je viens de Hongdae ».'},
        {kr:'홍대 가.', need:['홍대','가다'], bon:'Ton brutal (banmal). Il te jette un regard froid et démarre sans un mot.'} ]}
  };
  let cur='arrivee', phase='door';
  const view=document.getElementById('view');
  const known=(w)=>(mastery[w]||0)>=KNOWN;

  function readiness(req){
    const total=req.length, ok=req.filter(known).length;
    let cls,lab; if(ok===total){cls='ok';lab='Tes chances : élevées';}
    else if(ok>=Math.ceil(total/2)){cls='warn';lab='Tes chances : moyennes';}
    else {cls='no';lab='Tes chances : faibles';}
    return {cls,lab,ok,total,icon:cls==='ok'?'🟢':cls==='warn'?'🟠':'🔴'};
  }

  function renderDoor(){
    const ch=CH[cur], r=readiness(ch.req);
    view.innerHTML=`<div class="door">
      <div class="epi">제 화 · avant d’entrer</div>
      <h2>${ch.titre}</h2>
      <div class="story">${ch.porte}</div>
      <div class="gauge ${r.cls}"><div class="dot">${r.icon}</div>
        <div class="lab">${r.lab}</div><div class="cnt">${r.ok}/${r.total} mots du chapitre maîtrisés</div></div>
      <div class="row" style="justify-content:center;margin-top:18px">
        <button class="btn" id="rev">📚 Réviser dans l’app</button>
      </div>
      <div style="margin-top:12px"><button class="btn big enter" id="enter">Entrer dans le chapitre →</button></div>
      <div class="hint">Tu peux entrer même en rouge — mais aux moments qui comptent, si tu n’es pas prêt,
        ça sortira en charabia. À toi de juger si tu attends d’avoir révisé.</div>
    </div>`;
    view.querySelector('#rev').onclick=()=>{ ch.req.forEach(w=>mastery[w]=Math.min(5,(mastery[w]||0)+1)); renderDoor(); };
    view.querySelector('#enter').onclick=()=>{ phase='inside'; renderInside(); };
  }

  function renderInside(){
    const ch=CH[cur];
    view.innerHTML=`<button class="back" id="back">← quitter le chapitre</button>
      <div class="deconly">— décision · aucune aide —</div>
      <div class="npc">${ch.npc}</div>${ch.fr?`<div class="npcfr">${ch.fr}</div>`:''}
      <div id="ch"></div><div class="out" id="out"></div>`;
    view.querySelector('#back').onclick=()=>{ phase='door'; renderDoor(); };
    const box=view.querySelector('#ch');
    ch.choices.forEach(c=>{
      const b=document.createElement('button'); b.className='choice';
      b.innerHTML=`<div class="kr">${c.kr}</div>`;          // AUCUNE couleur, aucun score
      b.onclick=()=>{
        const ready=c.need.every(known);
        view.querySelector('#out').innerHTML = ready
          ? `<span class="g">✓</span> ${c.bon}`
          : `<span class="b">✕ Ça sort en charabia — tu n’étais pas prêt.</span> (Il te manquait des mots. Tu peux ressortir, réviser, et retenter.)`;
      };
      box.appendChild(b);
    });
  }

  document.getElementById('seg').addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b) return;
    cur=b.dataset.c; phase='door';
    [...document.querySelectorAll('#seg button')].forEach(x=>x.classList.toggle('on',x===b));
    renderDoor();
  });
  renderDoor();
})();
</script>
</body>
</html>
