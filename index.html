<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e1219">
<title>소리 · Aventure — démo</title>
</head>
<body>
<style>
  :root{
    --ground:#0e1219; --ground2:#080b11; --panel:#161d2b; --panel2:#1c2536;
    --line:#28324a; --ink:#ece4d6; --ink-dim:#9aa3b6; --muted:#6a7489;
    --amber:#f0a04b; --amber-soft:#f6c684; --teal:#57c9c0; --rose:#e6879e;
    --ok:#82cd93; --err:#e58a8a;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --ko:"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic","Nanum Gothic",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--ground2);color:var(--ink);font-family:var(--sans)}
  body{
    background:
      radial-gradient(120% 60% at 78% -8%, rgba(240,160,75,.10), transparent 60%),
      radial-gradient(120% 55% at 12% 108%, rgba(87,201,192,.07), transparent 60%),
      var(--ground);
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:600px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;
    padding:0 clamp(16px,5vw,26px) 120px;position:relative}
  /* header */
  #bar{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;
    padding:14px 2px 12px;background:linear-gradient(var(--ground) 62%,transparent);
    backdrop-filter:blur(2px)}
  .chap{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .aff{display:flex;align-items:center;gap:7px;font-family:var(--ko);font-size:.82rem;color:var(--ink-dim);
    opacity:0;transition:opacity .5s}
  .aff.on{opacity:1}
  .aff .heart{color:var(--rose);transition:transform .35s,filter .35s;filter:saturate(.5) brightness(.7)}
  .aff.warm .heart{filter:none}
  .aff.pulse .heart{transform:scale(1.5)}
  /* stage */
  #stage{flex:1;padding-top:6px}
  .beat{animation:rise .55s cubic-bezier(.2,.7,.2,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  p.narr{font-size:1.06rem;line-height:1.62;color:var(--ink);margin:0 0 1.05em;max-width:34em}
  p.stage{font-style:italic;color:var(--ink-dim);margin:0 0 1.05em;font-size:.98rem}
  .koline{font-family:var(--ko);text-align:center;color:var(--amber-soft);font-size:1.15rem;
    letter-spacing:.02em;margin:.2em 0 1.2em;opacity:.92}
  /* dialogue */
  .npc{display:flex;gap:12px;margin:0 0 1.15em;align-items:flex-start}
  .npc .who{flex:0 0 auto;font-family:var(--ko);font-size:.7rem;letter-spacing:.02em;color:var(--amber);
    background:rgba(240,160,75,.10);border:1px solid rgba(240,160,75,.25);border-radius:999px;
    padding:5px 10px;margin-top:4px;white-space:nowrap}
  .npc .line{font-family:var(--ko);font-size:1.34rem;line-height:1.5;color:#fff;
    border-left:2px solid var(--line);padding-left:14px}
  /* tappable known word */
  button.k{font:inherit;color:var(--amber-soft);background:none;border:0;padding:0;cursor:pointer;
    font-family:var(--ko);border-bottom:1px dotted rgba(246,198,132,.6)}
  button.k:active{color:#fff}
  /* controls */
  #act{margin-top:18px;display:flex;flex-direction:column;gap:11px}
  .btn{font:inherit;font-weight:600;color:var(--ink);background:var(--panel2);
    border:1px solid var(--line);border-radius:13px;padding:15px 16px;text-align:left;cursor:pointer;
    transition:border-color .18s,background .18s,transform .05s}
  .btn:hover{border-color:#3a4a66;background:#212b3e}
  .btn:active{transform:translateY(1px)}
  .btn:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  .btn.center{text-align:center;color:var(--amber-soft)}
  .choice{display:flex;flex-direction:column;gap:2px}
  .choice .ko{font-family:var(--ko);font-size:1.24rem;color:#fff;line-height:1.35}
  .deconly{font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--err);
    opacity:.75;text-align:center;margin:2px 0 4px}
  .prompt{color:var(--ink-dim);text-align:center;margin:0 0 4px;font-size:.98rem}
  /* charabia / consequence panel */
  .fallout{border:1px solid var(--line);border-left:3px solid var(--err);background:rgba(229,138,138,.06);
    border-radius:11px;padding:14px 15px;animation:rise .3s both}
  .fallout.cold{border-left-color:var(--muted);background:rgba(120,130,150,.06)}
  .fallout .say{font-style:italic;color:#fff;margin:0 0 8px;font-size:1.05rem}
  .fallout .cons{color:var(--ink-dim);margin:0 0 12px;line-height:1.5}
  /* title & end cards */
  .card{text-align:center;padding:12vh 6px 6vh;animation:rise .7s both}
  .card .mark{font-family:var(--ko);font-size:1rem;letter-spacing:.4em;color:var(--amber);opacity:.8;margin-bottom:26px}
  .card .epi{font-family:var(--ko);font-size:1.05rem;color:var(--ink-dim);letter-spacing:.1em}
  .card h1{font-family:var(--serif);font-weight:600;font-size:clamp(2.1rem,9vw,2.9rem);
    margin:.15em 0 .1em;text-wrap:balance;letter-spacing:.01em}
  .card .note{color:var(--ok);font-size:.9rem;margin:20px auto 30px;max-width:22em;line-height:1.5}
  .card .body{color:var(--ink-dim);max-width:24em;margin:0 auto 28px;line-height:1.6}
  .card .btn{display:inline-block;min-width:190px;text-align:center}
  .rule{width:44px;height:1px;background:var(--line);margin:0 auto 26px}
  /* translation sheet */
  #sheet{position:fixed;left:0;right:0;bottom:0;z-index:20;transform:translateY(120%);
    transition:transform .28s cubic-bezier(.2,.7,.2,1);padding:0 12px calc(14px + env(safe-area-inset-bottom))}
  #sheet.up{transform:none}
  #sheet .inner{max-width:576px;margin:0 auto;background:var(--panel);border:1px solid var(--line);
    border-radius:15px;padding:14px 16px;display:flex;align-items:center;gap:14px;
    box-shadow:0 -10px 40px rgba(0,0,0,.5)}
  #sheet .kw{font-family:var(--ko);font-size:1.5rem;color:#fff}
  #sheet .fr{color:var(--ink-dim);flex:1}
  #sheet .x{color:var(--muted);background:none;border:0;font-size:1.3rem;cursor:pointer;padding:4px}
  /* toast */
  #toast{position:fixed;left:50%;top:64px;transform:translate(-50%,-16px);z-index:30;opacity:0;
    transition:opacity .3s,transform .3s;font-family:var(--ko);font-size:.9rem;color:var(--rose);
    background:var(--panel);border:1px solid rgba(230,135,158,.4);border-radius:999px;padding:8px 16px;
    pointer-events:none}
  #toast.on{opacity:1;transform:translate(-50%,0)}
  body.tense #app{transition:filter .6s}
  body.tense #stage{filter:saturate(.75)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<div id="app">
  <header id="bar">
    <div class="chap" id="chap"></div>
    <div class="aff" id="aff"><span>지호</span><span class="heart">♥</span></div>
  </header>
  <main id="stage"></main>
  <div id="act"></div>
</div>

<div id="sheet"><div class="inner"><span class="kw"></span><span class="fr"></span><button class="x" aria-label="Fermer">✕</button></div></div>
<div id="toast"></div>

<script>
(function(){
  "use strict";
  const stage=document.getElementById('stage'), act=document.getElementById('act'),
        chapEl=document.getElementById('chap'), affEl=document.getElementById('aff'),
        sheet=document.getElementById('sheet'), toast=document.getElementById('toast');
  const state={aff:{jiho:0}, jihoSeen:false};

  // ---- data: chapitres 1 & 2 ----
  // narr accepte *kr|fr* = mot connu, révélation au tap (jamais traduit en ligne).
  const N=(t)=>({t:'narr',h:t}), ST=(t)=>({t:'stage',h:t}), KO=(t)=>({t:'ko',h:t}),
        NPC=(w,l)=>({t:'npc',w:w,l:l});
  const S={
    title1:{card:1,mark:'소리',epi:'제1화',title:'Arrivée',
      note:'🟢 Chapitre d’ouverture — jouable même sans rien connaître.',go:'c1_1',cta:'시작 · Commencer'},
    c1_1:{blocks:[
      N("Les portes de l’aéroport d’Incheon s’ouvrent sur la nuit. Presque minuit. Toi, une valise, et six mois devant toi."),
      N("Sur un panneau lumineux, un seul mot que tu reconnais : *택시|taxi*. Tu suis la file.")
    ],cont:'c1_2'},
    c1_2:{blocks:[
      ST("Un employé en gilet fluo te fait signe vers une file de voitures oranges."),
      NPC('안내원',"안녕하세요! 택시, 여기요.")
    ],cont:'c1_3'},
    c1_3:{blocks:[
      N("Tu montes à l’arrière. Le chauffeur, la soixantaine, croise ton regard dans le rétroviseur."),
      NPC('기사님',"어서 오세요. 어디로 가세요?"),
      N("Il attend ta destination. Ton logement est à *홍대|Hongdae*. Dans l’avion, tu avais répété : « … *까지|jusqu’à* *가 주세요|allez-y, s’il vous plaît*. »")
    ],dec:{prompt:'À toi de répondre.',choices:[
      {ko:'홍대까지 가 주세요.',r:'go',go:'c1_end'},
      {ko:'홍대에서 왔어요.',r:'retry',say:'Je viens de Hongdae.',cons:'Le chauffeur fronce les sourcils. « …네? » La voiture ne bouge pas.'},
      {ko:'홍대 가.',r:'branch',go:'c1_cold',cold:1,say:'Hongdae. Roule.',cons:'Un ton sec, deux mots. Il te fixe une seconde dans le rétro, sans un mot, et démarre. La course sera glaciale.'}
    ]}},
    c1_end:{blocks:[
      N("Le chauffeur hoche la tête. « 네, 홍대. » Le compteur s’allume, la voiture glisse dans la nuit."),
      N("Trente minutes de néons et de ponts. La voiture s’arrête devant un immeuble étroit."),
      NPC('기사님',"다 왔어요."),
      N("Tu descends, la valise sur le trottoir. Un mot te vient, le seul qu’il faut : *감사합니다|merci*.")
    ],cont:'end1'},
    c1_cold:{blocks:[
      N("La course se fait en silence. Le chauffeur ne dira plus un mot jusqu’à l’immeuble étroit où il te dépose."),
      N("Tu descends dans le froid. Premier soir, premier malentendu.")
    ],cont:'end1'},
    end1:{card:1,epi:'',title:'Fin du chapitre 1',note:'✅ 10 nouveaux mots ajoutés à ta révision.',
      body:'Le 고시원 t’attend, tout en haut de l’escalier.',go:'title2',cta:'Continuer'},

    title2:{card:1,mark:'소리',epi:'제2화',title:'Le premier soir',
      note:'🟢 Tu connais déjà tout le nécessaire.',go:'c2_1',cta:'시작 · Commencer'},
    c2_1:{blocks:[
      N("Tu montes trois étages dans un escalier qui sent le riz froid et la peinture. Porte 302. Tu cherches l’interrupteur à tâtons. *불|lumière*."),
      N("La lumière grésille sur une pièce grande comme un placard : un lit qui touche les deux murs, une fenêtre, un bureau."),
      KO("방이 좁아요.|La chambre est étroite."),
      N("Tu poses la valise. Dehors, une ville de dix millions d’inconnus. Six mois. Le silence bourdonne.")
    ],cont:'c2_2'},
    c2_2:{blocks:[
      ST("똑, 똑."),
      N("On frappe. Tu ouvres. Dans le couloir, quelqu’un de ton âge, un torchon sur l’épaule, tenant une petite casserole à deux mains. Un sourire timide."),
      NPC('지호',"저기… 안녕하세요. 옆 방이에요."),
      ST("De la vapeur, une odeur de bouillon épicé."),
      NPC('지호',"라면 먹을래요? 너무 많이 만들었어요."),
      N("Ton ventre, lui, a déjà répondu.")
    ],dec:{prompt:'Que réponds-tu ?',choices:[
      {ko:'네, 좋아요. 감사합니다.',r:'go',go:'c2_meal',aff:1},
      {ko:'저는 라면이에요.',r:'retry',say:'Je suis un ramyeon.',cons:'지호 cligne des yeux, une seconde… puis se mord la lèvre pour ne pas rire. « …네? »'},
      {ko:'아니요, 괜찮아요.',r:'branch',go:'c2_alone',cold:1,aff:-1,cons:'Tu refuses par timidité. 지호 hoche la tête, un peu déçu·e. « 아… 네. 그럼… 안녕히 주무세요. » La porte se referme.'}
    ]}},
    c2_meal:{blocks:[
      N("Le sourire de 지호 s’élargit, soulagé. « 아, 다행이다. » Il/elle pousse la porte du pied, s’assoit sur le coin du bureau, et pose la casserole fumante entre vous deux."),
      N("지호 te tend une paire de baguettes, casse un œuf dans le bouillon, parle lentement, exprès, en te regardant comprendre."),
      NPC('지호',"이거, 진짜 맛있어요. 여기 라면이 최고예요."),
      N("C’est brûlant, c’est trop épicé, c’est parfait."),
      NPC('지호',"저는 지호예요. 옆 방. 뭐 필요하면… 그냥 노크하세요."),
      N("Pour la première fois depuis l’aéroport, la petite pièce semble moins froide. Dehors, la ville d’inconnus a un visage de moins.")
    ],cont:'end2'},
    c2_alone:{blocks:[
      N("Tu écoutes les pas de 지호 s’éloigner, la porte d’à côté se fermer. À travers le mur mince, le tintement discret d’une cuillère contre une casserole."),
      N("Tu manges tes biscuits d’avion, seul·e, dans le noir. Demain, peut-être, tu frapperas à ton tour.")
    ],cont:'end2'},
    end2:{card:1,epi:'',title:'Fin de la démo',
      body:'Chapitre 3 à venir — la supérette, seul·e dans la nuit de Séoul.',recap:1,go:'title1',cta:'↻ Rejouer depuis le début'}
  };

  // ---- render helpers ----
  function frag(t){ // *kr|fr* -> bouton au tap
    return t.replace(/\*([^|*]+)\|([^*]+)\*/g,(m,kr,fr)=>
      `<button class="k" data-kr="${kr}" data-fr="${fr}">${kr}</button>`);
  }
  function showSheet(kr,fr){
    sheet.querySelector('.kw').textContent=kr; sheet.querySelector('.fr').textContent=fr;
    sheet.classList.add('up');
  }
  function hideSheet(){ sheet.classList.remove('up'); }
  sheet.querySelector('.x').onclick=hideSheet;
  document.addEventListener('click',e=>{
    const k=e.target.closest('button.k');
    if(k){ showSheet(k.dataset.kr,k.dataset.fr); e.stopPropagation(); return; }
    if(!e.target.closest('#sheet')) hideSheet();
  });

  function toastAff(d){
    toast.textContent='지호 ♥ '+(d>0?'+ 가까워졌어요':'− 멀어졌어요');
    toast.classList.add('on'); setTimeout(()=>toast.classList.remove('on'),1700);
  }
  function applyAff(d){
    state.aff.jiho+=d; state.jihoSeen=true;
    affEl.classList.add('on'); affEl.classList.toggle('warm',state.aff.jiho>0);
    affEl.classList.add('pulse'); setTimeout(()=>affEl.classList.remove('pulse'),380);
    toastAff(d);
  }

  function block(b){
    const d=document.createElement('div');
    if(b.t==='narr'){ d.innerHTML='<p class="narr">'+frag(b.h)+'</p>'; return d.firstChild; }
    if(b.t==='stage'){ d.innerHTML='<p class="stage">'+frag(b.h)+'</p>'; return d.firstChild; }
    if(b.t==='ko'){ const [kr,fr]=b.h.split('|');
      d.innerHTML=`<div class="koline"><button class="k" data-kr="${kr}" data-fr="${fr}">${kr}</button></div>`;
      return d.firstChild; }
    if(b.t==='npc'){ d.innerHTML=`<div class="npc"><span class="who">${b.w}</span><span class="line">${b.l}</span></div>`; return d.firstChild; }
  }

  function go(id){ hideSheet(); render(id); window.scrollTo({top:0,behavior:'instant'}); }

  function render(id){
    const sc=S[id]; act.innerHTML=''; document.body.classList.remove('tense');
    if(sc.card){ renderCard(sc); return; }
    chapEl.textContent = id.startsWith('c1')||id==='end1' ? '제1화 · Arrivée'
                        : id.startsWith('c2')||id==='end2' ? '제2화 · Le premier soir' : '';
    stage.innerHTML='';
    const wrap=document.createElement('div'); wrap.className='beat';
    sc.blocks.forEach(b=>wrap.appendChild(block(b)));
    stage.appendChild(wrap);
    if(sc.cont){
      const b=document.createElement('button'); b.className='btn center'; b.textContent='계속 · Continuer';
      b.onclick=()=>go(sc.cont); act.appendChild(b);
    } else if(sc.dec){ renderDecision(sc.dec); }
  }

  function renderDecision(dec){
    document.body.classList.add('tense');           // l'écran se tend : aide coupée
    const p=document.createElement('div'); p.className='deconly'; p.textContent='— décision · aucune aide —';
    act.appendChild(p);
    if(dec.prompt){ const q=document.createElement('p'); q.className='prompt'; q.textContent=dec.prompt; act.appendChild(q); }
    const holder=document.createElement('div'); holder.style.display='flex';
    holder.style.flexDirection='column'; holder.style.gap='11px'; act.appendChild(holder);
    dec.choices.forEach(ch=>{
      const b=document.createElement('button'); b.className='btn choice';
      b.innerHTML=`<span class="ko">${ch.ko}</span>`;
      b.onclick=()=>pick(ch,holder,dec);
      holder.appendChild(b);
    });
  }

  function pick(ch,holder,dec){
    hideSheet();
    if(ch.r==='go'){ if(ch.aff) applyAff(ch.aff); document.body.classList.remove('tense'); go(ch.go); return; }
    // retry ou branch : montrer le charabia / la conséquence
    holder.querySelectorAll('button').forEach(x=>x.disabled=true);
    const f=document.createElement('div'); f.className='fallout'+(ch.cold?' cold':'');
    f.innerHTML=(ch.say?`<p class="say">« ${ch.say} »</p>`:'')+`<p class="cons">${ch.cons}</p>`;
    const b=document.createElement('button'); b.className='btn center';
    if(ch.r==='retry'){
      b.textContent='다시 · Réessayer';
      b.onclick=()=>{ f.remove(); b.remove(); holder.querySelectorAll('button').forEach(x=>x.disabled=false); };
    } else { // branch
      b.textContent='계속 · Continuer';
      b.onclick=()=>{ if(ch.aff) applyAff(ch.aff); document.body.classList.remove('tense'); go(ch.go); };
    }
    f.appendChild(b); act.appendChild(f);
    act.scrollIntoView({block:'end',behavior:'smooth'});
  }

  function renderCard(sc){
    document.body.classList.remove('tense'); chapEl.textContent=''; stage.innerHTML='';
    const c=document.createElement('div'); c.className='card';
    let recap='';
    if(sc.recap){ const s=state.aff.jiho;
      recap=`<p class="body" style="color:var(--rose)">지호 — ${s>0?'un lien qui commence 🌱':s<0?'un premier contact manqué (rattrapable)':'—'}</p>`; }
    c.innerHTML=
      (sc.mark?`<div class="mark">${sc.mark}</div>`:'')+
      (sc.epi?`<div class="epi">${sc.epi}</div>`:'')+
      `<h1>${sc.title}</h1>`+
      (sc.rule!==0?'<div class="rule"></div>':'')+
      (sc.note?`<p class="note">${sc.note}</p>`:'')+
      (sc.body?`<p class="body">${sc.body}</p>`:'')+recap;
    const b=document.createElement('button'); b.className='btn'; b.textContent=sc.cta||'Continuer';
    b.onclick=()=>{ if(sc.go==='title1'){state.aff.jiho=0;state.jihoSeen=false;affEl.className='aff';} go(sc.go); };
    c.appendChild(b); stage.appendChild(c);
  }

  render('title1');
})();
</script>
</body>
</html>
